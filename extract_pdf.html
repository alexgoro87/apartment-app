<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<body>
    <h1>EXTRACTING PDF...</h1>
    <div id="output"></div>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        async function extract() {
            try {
                const pdf = await pdfjsLib.getDocument('../קטלוג-משתכן-רמת-רבין.pdf').promise;
                let out = "TOTAL PAGES: " + pdf.numPages + "\n\n";
                // Only scan first 20 pages to find the index/tables
                for (let i = 1; i <= 20; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    const text = content.items.map(s => s.str).join(' | ');
                    out += `===== PAGE ${i} =====\n${text}\n\n`;
                }
                document.getElementById('output').innerText = out;
                console.log("DONE");
            } catch (e) {
                document.getElementById('output').innerText = "ERROR: " + e.message;
            }
        }
        extract();
    </script>
</body>

</html>
